name: CD - デプロイ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository }}/dashboard

jobs:
  # ============================================================
  # Docker イメージビルド & プッシュ
  # ============================================================
  build-and-push:
    name: ビルド & プッシュ
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx セットアップ
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry ログイン
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: タグ取得
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: バックエンドイメージ ビルド & プッシュ
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ダッシュボードイメージ ビルド & プッシュ
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.DASHBOARD_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # ステージング環境デプロイ
  # ============================================================
  deploy-staging:
    name: ステージングデプロイ
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: SSHデプロイ
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/tradepost-pro
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T backend python3 -m pytest tests/ -v --tb=short
            echo "✓ ステージングデプロイ完了"

      - name: ヘルスチェック
        run: |
          sleep 15
          curl -sf https://staging.tradepost-pro.com/health || echo "ヘルスチェック失敗（ステージング）"

  # ============================================================
  # 本番環境デプロイ
  # ============================================================
  deploy-production:
    name: 本番デプロイ
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: SSHデプロイ
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/tradepost-pro

            # バックアップ
            docker compose exec -T db mysqldump -u root -p${DB_ROOT_PASSWORD} tradepost > /opt/backups/pre-deploy_$(date +%Y%m%d_%H%M%S).sql

            # デプロイ
            git pull origin main
            docker compose pull
            docker compose --profile production up -d --remove-orphans

            # マイグレーション
            docker compose exec -T backend python3 -c "from backend.models.database import init_db; init_db()"

            echo "✓ 本番デプロイ完了"

      - name: ヘルスチェック
        run: |
          sleep 20
          curl -sf https://tradepost-pro.com/health || echo "ヘルスチェック警告"
          curl -sf https://api.tradepost-pro.com/health || echo "APIヘルスチェック警告"

      - name: デプロイ通知（Slack）
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "TradePost Pro 本番デプロイ: ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
